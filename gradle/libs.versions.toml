[versions]
loom = "1.17.+"

minecraft = "26.3-snapshot-3"
# https://fabricmc.net/develop
loader = "0.19.3"

lwjgl = "3.4.1"

[libraries]
# the minecraft dependency for the fabric project only.
minecraft = { module = "com.mojang:minecraft", version.ref = "minecraft" }
loader = { module = "net.fabricmc:fabric-loader", version.ref = "loader" }

lwjgl-sdl = { module = "org.lwjgl:lwjgl-sdl", version.ref = "lwjgl" }

[bundles]
fabric = [ "loader" ]

[plugins]
loom = { id = "net.fabricmc.fabric-loom", version.ref = "loom" }
